<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate Invitation Link — Michael Vinci & Merlin</title>
  <meta name="description" content="Generate personalized wedding invitation links for Michael Vinci and Merlin.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="generator-page">
  <div class="grain-overlay" aria-hidden="true"></div>

  <main class="generator-shell">
    <section class="generator-card">
      <a href="index.html" class="nav__brand generator-brand" aria-label="Back to invitation">囍</a>
      <p class="overline gold-shimmer">Sender Tools</p>
      <h1>Generate Invitation Message</h1>
      <p class="generator-intro">
        Masukkan nama tamu untuk membuat link personal dan template pesan siap kirim.
      </p>

      <form class="sender-form">
        <label>
          Nama Tamu
          <input type="text" name="guestName" placeholder="Michael Vinci & Partner" required>
        </label>
        <label>
          Base URL Undangan
          <input type="url" name="baseUrl" placeholder="https://michaelmerlin.my.id/">
        </label>
        <button class="btn btn--gold" type="submit">Generate Message</button>
      </form>

      <div class="sender-result" hidden>
        <label>
          Link Undangan
          <input type="text" class="sender-url" readonly>
        </label>
        <label>
          Pesan Undangan
          <textarea class="sender-message" rows="15" readonly></textarea>
        </label>
        <div class="generated-actions">
          <button class="btn btn--outline" type="button" id="copy-message">Copy Message</button>
          <button class="btn btn--outline" type="button" id="copy-link">Copy Link</button>
          <a class="btn btn--outline" id="preview-link" href="index.html" target="_blank" rel="noreferrer">Open
            Preview</a>
        </div>
        <p class="sender-note" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script src="generator.js"></script>
</body>

</html>
